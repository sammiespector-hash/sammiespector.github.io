<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Sammie Spector</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F4F2ED;
      --cream-dark: #EAE7E0;
      --ink: #1A1A18;
      --ink-light: #4A4A46;
      --navy: #1B2F6E;
      --accent: #B386EF;
      --accent-light: #D9C2F5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body.locked .auth-content { display: none; }

    /* PASSWORD GATE */
    .password-gate {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 20px;
    }
    .password-gate.hidden { display: none; }
    .password-gate-inner {
      max-width: 360px;
      width: 100%;
    }
    .password-gate label {
      display: block;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
    }
    .password-gate input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--cream-dark);
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .password-gate input[type="password"]:focus {
      border-color: var(--accent);
    }
    .password-gate .error {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 12px;
      min-height: 20px;
    }
    .password-gate button {
      width: 100%;
      padding: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      background: var(--accent);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .password-gate button:hover { opacity: 0.9; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      background: var(--cream);
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s ease, background 0.4s ease;
    }
    nav.scrolled {
      border-bottom-color: var(--cream-dark);
      background: rgba(244, 242, 237, 0.96);
      backdrop-filter: blur(8px);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }
    .logo-mark { width: 36px; height: auto; opacity: 0.92; transition: opacity 0.3s; }
    .nav-brand:hover .logo-mark { opacity: 1; }
    .nav-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      transition: color 0.3s;
    }
    .nav-brand:hover .nav-name { color: var(--accent); }
    nav ul { list-style: none; display: flex; gap: 48px; }
    nav ul li a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink-light);
      position: relative;
      transition: color 0.3s ease;
    }
    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.35s ease;
    }
    nav ul li a:hover { color: var(--accent); }
    nav ul li a:hover::after { width: 100%; }

    /* PAGE CONTENT */
    .portfolio-content {
      padding: 140px 60px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .portfolio-content .section-tag {
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
    }
    .portfolio-content .prose {
      max-width: 680px;
      font-size: 20px;
      font-weight: 300;
      color: var(--ink-light);
      line-height: 1.7;
    }

    .section-divider {
      width: 1px; height: 48px;
      background: var(--cream-dark);
      margin: 0 auto;
    }

    section {
      padding: 60px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    section .section-tag {
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .industry-list { margin-top: 20px; border-top: 1px solid var(--cream-dark); }
    .industry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--cream-dark);
      text-decoration: none;
      color: var(--ink);
      transition: color 0.3s;
    }
    .industry-title { font-size: 22px; font-weight: 400; transition: color 0.3s; }
    .industry-type {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      transition: color 0.3s;
      flex-shrink: 0;
      margin-left: 32px;
    }
    .industry-item:hover .industry-title { color: var(--accent); }
    .industry-item:hover .industry-type { color: var(--accent-light); }
    #say-hello .industry-list { border-top: none; }
    #say-hello .industry-item { border-bottom: none; padding: 8px 0; }

    footer {
      border-top: 1px solid var(--cream-dark);
      padding: 32px 60px;
    }
    footer p { font-size: 13px; color: var(--ink-light); letter-spacing: 0.06em; }

    @media (max-width: 900px) {
      nav { padding: 24px 32px; }
      nav ul { gap: 28px; }
      nav ul li a { font-size: 14px; letter-spacing: 0.08em; }
      .portfolio-content { padding: 120px 32px 60px; }
      .portfolio-content .prose { font-size: 18px; }
      section { padding: 48px 32px; }
      footer { padding: 24px 32px; }
    }
    @media (max-width: 600px) {
      nav { padding: 20px 20px; }
      nav ul { gap: 20px; }
      nav ul li a { font-size: 13px; letter-spacing: 0.06em; }
      .nav-name { font-size: 13px; letter-spacing: 0.12em; }
      .logo-mark { width: 32px; }
      .portfolio-content { padding: 100px 20px 48px; }
      .portfolio-content .prose { font-size: 17px; }
      section { padding: 36px 20px; }
      footer { padding: 20px; }
      footer p { font-size: 12px; }
    }
  </style>
</head>
<body class="locked">

  <!-- PASSWORD GATE -->
  <div id="password-gate" class="password-gate">
    <div class="password-gate-inner">
      <label for="portfolio-password">Enter password</label>
      <input type="password" id="portfolio-password" placeholder="Password" autocomplete="current-password" autofocus>
      <p class="error" id="password-error" aria-live="polite"></p>
      <button type="button" id="password-submit">Enter</button>
    </div>
  </div>

  <!-- NAV (visible after unlock) -->
  <nav id="main-nav" class="auth-content">
    <a href="index.html" class="nav-brand">
      <img class="logo-mark" src="assets/logo.png" alt="Sammie Spector" width="40" height="40" />
      <span class="nav-name">Sammie Spector</span>
    </a>
    <ul>
      <li><a href="index.html#experience">Work</a></li>
      <li><a href="index.html#industry">Industry</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
  </nav>

  <main class="portfolio-content auth-content">
    <p class="section-tag">Portfolio</p>
    <div class="prose">
      <p>Portfolio content coming soon.</p>
    </div>
  </main>

  <div class="section-divider"></div>

  <section id="say-hello" class="auth-content">
    <p class="section-tag">Say Hello</p>
    <div class="industry-list">
      <a href="mailto:hello@sammiespector.com" class="industry-item">
        <span class="industry-title">hello@sammiespector.com</span>
        <span class="industry-type">Email ↗</span>
      </a>
      <a href="https://www.linkedin.com/in/sammiespector" class="industry-item" target="_blank" rel="noopener">
        <span class="industry-title">LinkedIn</span>
        <span class="industry-type">Profile ↗</span>
      </a>
    </div>
  </section>

  <footer class="auth-content">
    <p>© 2026 Sammie Spector</p>
  </footer>

  <script>
    (function() {
      const PASSWORD = 'ss2026';
      const STORAGE_KEY = 'portfolio_authenticated';

      const gate = document.getElementById('password-gate');
      const content = document.querySelectorAll('.auth-content');
      const input = document.getElementById('portfolio-password');
      const submitBtn = document.getElementById('password-submit');
      const errorEl = document.getElementById('password-error');

      function unlock() {
        sessionStorage.setItem(STORAGE_KEY, '1');
        document.body.classList.remove('locked');
        gate.classList.add('hidden');
      }

      function showError(msg) {
        errorEl.textContent = msg;
      }

      if (sessionStorage.getItem(STORAGE_KEY)) {
        unlock();
      }

      function checkPassword() {
        const value = (input.value || '').trim();
        if (value === PASSWORD) {
          showError('');
          unlock();
        } else {
          showError('Incorrect password. Try again.');
          input.focus();
        }
      }

      submitBtn.addEventListener('click', checkPassword);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkPassword();
        }
      });
    })();

    const nav = document.getElementById('main-nav');
    if (nav) {
      window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 40);
      });
    }
  </script>

</body>
</html>
